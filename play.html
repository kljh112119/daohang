// 获取首页传递的剧集ID
const urlParams=new URLSearchParams(window.location.search);
const videoId=urlParams.get("id");
const videoData=videoSources[videoId]||{title:"剧集不存在",lines:[]};

// 渲染标题
document.getElementById("videoTitle").innerText=videoData.title;

// 渲染线路
const lineContainer=document.getElementById("lineContainer");
videoData.lines.forEach((line,index)=>{
    const btn=document.createElement("button");
    btn.className="line-btn"+(index===0?" active":"");
    btn.innerText=line.name;
    btn.onclick=()=>{
        // 切换线路激活状态
        document.querySelectorAll(".line-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        // 渲染对应线路的集数
        renderEpisodes(index);
    };
    lineContainer.appendChild(btn);
});

// 渲染集数（默认显示第一条线路）
function renderEpisodes(lineIndex){
    const episodeContainer=document.getElementById("episodeContainer");
    episodeContainer.innerHTML="";
    const urls=videoData.lines[lineIndex].urls;
    
    urls.forEach((url,idx)=>{
        const btn=document.createElement("button");
        btn.className="episode-btn";
        btn.innerText=`第${idx+1}集`;
        btn.onclick=()=>window.open(url,"_blank");
        episodeContainer.appendChild(btn);
    });
}

// 初始加载第一条线路的集数
if(videoData.lines.length>0)renderEpisodes(0);
