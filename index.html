<div id="episodeModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">

    <div class="relative bg-[#1A1B20] rounded-xl w-[90%] max-w-2xl max-h-[80vh] overflow-y-auto p-6">

            <h3 id="modalTitle" class="text-xl font-bold">选择播放</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fa fa-times text-xl"></i></button>
        </div>

        <div id="episodeList" class="grid grid-cols-6 sm:cols-8 md:cols-10 gap-2"></div>

<script>
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
    navbar.classList.toggle('bg-black/70', window.scrollY > 30);
    navbar.classList.toggle('py-3', window.scrollY > 30);
});

function go(url) { window.open(url, '_blank'); }
let currentSources = [];

function openMultiSource(title, sources) {
    currentSources = sources;
    document.getElementById('modalTitle').innerText = title + " - 选择线路";
    const tabs = document.getElementById('sourceTabs');
    tabs.innerHTML = '';
    sources.forEach((s, i) => {
        const b = document.createElement('button');
        b.className = 'px-3 py-1 rounded bg-red-600 text-white';
        b.innerText = s.name;
        b.onclick = () => showEpisodes(i);
        tabs.appendChild(b);
    });
    showEpisodes(0);
    document.getElementById('episodeModal').classList.remove('hidden');
}

function showEpisodes(sourceIndex) {
    const list = document.getElementById('episodeList');
    list.innerHTML = '';
    const urls = currentSources[sourceIndex].urls;
    urls.forEach((url, i) => {
        const btn = document.createElement('button');
        btn.className = 'py-2 px-3 bg-black/40 hover:bg-red-600 rounded text-center transition';
        btn.innerText = '第' + (i+1) + '集';
        btn.onclick = () => { window.open(url, '_blank'); closeModal(); };
        list.appendChild(btn);
    });
}

function closeModal() {
    document.getElementById('episodeModal').classList.add('hidden');
}

function setStyle(mode) {
    if(mode === 'dark') document.body.className = 'bg-[#0F1014] text-white transition-colors duration-300';
    if(mode === 'gold') document.body.className = 'bg-[#080600] text-[#F6E8C1] transition-colors duration-300';
    if(mode === 'light') document.body.className = 'bg-[#F8F9FA] text-[#212529] transition-colors duration-300';
}
</script>
