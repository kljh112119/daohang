<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高端影视导航</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        .card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-6px) scale(1.03); }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        .carousel { position: relative; width: 100%; height: 80vh; overflow: hidden; }
        .carousel-item { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease; }
        .carousel-item.active { opacity: 1; }
    </style>
</head>
<body class="bg-[#0F1014] text-white transition-colors duration-300">

<!-- 风格切换 -->
<div class="fixed top-5 right-5 z-50 flex gap-2">
    <button onclick="setStyle('dark')" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 text-sm">暗黑</button>
    <button onclick="setStyle('gold')" class="w-9 h-9 rounded-full bg-[#D4AF37]/20 flex items-center justify-center hover:bg-[#D4AF37]/30 text-sm">金色</button>
    <button onclick="setStyle('light')" class="w-9 h-9 rounded-full bg-gray-200 flex items-center justify-center text-gray-800 text-sm">浅色</button>
</div>

<!-- 导航栏 -->
<nav id="navbar" class="fixed w-full top-0 z-40 py-4 transition-all duration-300">
    <div class="container mx-auto px-5 flex justify-between items-center">
        <a href="#" class="text-2xl font-bold text-[#E50914]">影视导航</a>
        <a href="#" class="text-2xl font-bold text-[#E50914]">无广告 无广告 无广告 </a>
        <div class="hidden md:flex gap-6 text-lg">
             <a href="" class="hover:text-[#E50914] transition-colors">首页没有的到导航网址去看</a>
            <a href="#movie" class="hover:text-[#E50914] transition-colors">热门电影</a>
            <a href="#tv" class="hover:text-[#E50914] transition-colors">热门电视剧</a>
            <a href="#anime" class="hover:text-[#E50914] transition-colors">热门动漫</a>
            <a href="#nav" class="hover:text-[#E50914] transition-colors">网址导航</a>
        </div>
    </div>
</nav>

<!-- 轮播 -->
<div class="carousel">
    <div class="carousel-item active">
        <div class="absolute inset-0">
            <img src="https://tv.puui.qpic.cn/tv/0/mz_tv_image_frontend_442f1e-8_1281176683_1774343769856205_pic_1920x800/0" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0F1014] via-black/60 to-transparent"></div>
        </div>
        <div class="relative container mx-auto px-5 z-10 h-full flex items-center max-w-xl">
            <div>
                <h1 class="text-[clamp(2rem,5vw,4rem)] font-bold leading-tight mb-4">遮天<br>高清免费看</h1>
                <p class="text-gray-300 text-lg mb-6">全网影视聚合，秒加载无广告</p>
                <button onclick="go('https://baidu.com')" class="px-6 py-3 bg-[#E50914] rounded-full text-white font-medium hover:bg-[#c10810] transition-colors">
                    <i class="fa fa-play mr-2"></i>立即观看
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 内容 -->
<div class="container mx-auto px-5 py-16 space-y-20">

<!-- 热门电影 -->
<section id="movie">
    <h2 class="text-2xl md:text-3xl font-bold mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-[#E50914] rounded-full"></span>热门电影
    </h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
        <div class="card rounded-xl overflow-hidden bg-black/30 shadow-xl">            
            <img src="https://vip.dytt-img.com/upload/vod/20260321-1/447b6d4edee1580c14cffd23081f6028.jpg" 
                 onclick="openMultiSource('河狸变身计划', [
                     {name:'线路①', urls:['https://svip.ryiplay18.com/20260326/4133_c7531a9b/index.m3u8']},
                     {name:'线路②', urls:['https://svip.ryiplay18.com/share/b2330fc4531de135266de49078c270dd']}
                 ])"
                 class="w-full aspect-[2/3] object-cover cursor-pointer">
            <div class="p-3">
                <div class="font-medium truncate">在线观看: 河狸变身计划</div>
                <button onclick="go('https://pan.baidu.com/xxx')" class="mt-2 w-full text-xs bg-blue-600 hover:bg-blue-700 text-white py-1 rounded">
                    <i class="fa fa-cloud mr-1"></i>网盘转存观看
                </button>
            </div>
        </div>
    </div>
</section>

<!-- 热门电视剧 -->
<section id="tv">
    <h2 class="text-2xl md:text-3xl font-bold mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-[#E50914] rounded-full"></span>热门电视剧
    </h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
        
        <div class="card rounded-xl overflow-hidden bg-black/30 shadow-xl">
            <img src="https://hongniuzyimage.com/cover/e7d278a2f3c239afeaf9526d7e275401.jpg" 
                 onclick="openMultiSource('逐玉', [
                     {name:'线路①', urls:['https://baidu.com/1','https://baidu.com/2']},
                     {name:'线路②', urls:['https://baidu.com/1','https://baidu.com/2']}
                 ])"
                 class="w-full aspect-[2/3] object-cover cursor-pointer">
            <div class="p-3">
                <div class="font-medium truncate">在线播放: 逐玉</div>
            </div>
        </div>

    </div>
</section>

<!-- 热门动漫 -->
<section id="anime">
    <h2 class="text-2xl md:text-3xl font-bold mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-[#E50914] rounded-full"></span>热门动漫
    </h2>
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
        
        <div class="card rounded-xl overflow-hidden bg-black/30 shadow-xl">
            <img src="https://tv.puui.qpic.cn/tv/0/mz_tv_image_frontend_442f1e-8_1281176683_1774343769856205_pic_480x720/0" 
                 onclick="openMultiSource('遮天', [
                     {name:'线路①', urls:['https://baidu.com/1','https://baidu.com/2']},
                     {name:'线路②', urls:['https://baidu.com/1','https://baidu.com/2']}
                 ])"
                 class="w-full aspect-[2/3] object-cover cursor-pointer">
            <div class="p-3">
                <div class="font-medium truncate">遮天</div>
            </div>
        </div>

    </div>
</section>

<!-- 导航 -->
<section id="nav" class="pb-10">
    <h2 class="text-2xl md:text-3xl font-bold mb-6 flex items-center gap-2">
        <span class="w-2 h-8 bg-[#E50914] rounded-full"></span>电影导航网址
    </h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
        <a href="https://baidu.com" target="_blank" class="card p-5 rounded-xl bg-white/10 hover:bg-white/15 flex items-center gap-4">
            <i class="fa fa-link text-2xl text-[#E50914]"></i>
            <div><div class="font-medium text-lg">影视网站</div><div class="text-sm text-gray-400">https://xxx.com</div></div>
        </a>
    </div>
</section>

</div>

<!-- 多线路集数弹窗 -->
<div id="episodeModal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-black/80" onclick="closeModal()"></div>
    <div class="relative bg-[#1A1B20] rounded-xl w-[90%] max-w-2xl max-h-[80vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
            <h3 id="modalTitle" class="text-xl font-bold">选择播放</h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-white"><i class="fa fa-times text-xl"></i></button>
        </div>
        <div id="sourceTabs" class="flex gap-2 mb-4 flex-wrap"></div>
        <div id="episodeList" class="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-2"></div>
    </div>
</div>

<footer class="bg-black/40 py-8 text-center text-gray-400 text-sm">© 高端影视导航 - 可正常播放</footer>

<script>
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
    navbar.classList.toggle('glass', window.scrollY > 30);
    navbar.classList.toggle('py-3', window.scrollY > 30);
    navbar.classList.toggle('bg-black/70', window.scrollY > 30);
});

// 安全跳转（GitHub 可用）
function go(url) {
    const a = document.createElement('a');
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

// 轮播
let index = 0;
const items = document.querySelectorAll('.carousel-item');
if (items.length > 1) {
  setInterval(() => {
      items.forEach(i => i.classList.remove('active'));
      index = (index + 1) % items.length;
      items[index].classList.add('active');
  }, 4500);
}

let currentSources = [];

// 多线路 + 集数选择（GitHub 完美修复）
function openMultiSource(title, sources) {
    currentSources = sources;
    document.getElementById('modalTitle').innerText = title + " - 选择线路";
    const tabs = document.getElementById('sourceTabs');
    tabs.innerHTML = '';
    sources.forEach((s, i) => {
        const b = document.createElement('button');
        b.className = 'px-3 py-1 rounded bg-[#E50914] text-white hover:bg-[#c10810] transition-colors';
        b.innerText = s.name;
        b.onclick = () => showEpisodes(i);
        tabs.appendChild(b);
    });
    showEpisodes(0);
    document.getElementById('episodeModal').classList.remove('hidden');
}

function showEpisodes(sourceIndex) {
    const list = document.getElementById('episodeList');
    list.innerHTML = '';
    const urls = currentSources[sourceIndex].urls;
    urls.forEach((url, i) => {
        const btn = document.createElement('button');
        btn.className = 'py-2 px-3 bg-black/40 hover:bg-[#E50914] rounded text-center transition';
        btn.innerText = '第' + (i+1) + '集';
        btn.onclick = () => { go(url); closeModal(); };
        list.appendChild(btn);
    });
}

function closeModal() {
    document.getElementById('episodeModal').classList.add('hidden');
}

function setStyle(mode) {
    const body = document.body;
    if(mode === 'dark') body.className = 'bg-[#0F1014] text-white transition-colors duration-300';
    if(mode === 'gold') body.className = 'bg-[#080600] text-[#F6E8C1] transition-colors duration-300';
    if(mode === 'light') body.className = 'bg-[#F8F9FA] text-[#212529] transition-colors duration-300';
}
</script>
</body>
</html>
