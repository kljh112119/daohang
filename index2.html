    <style>
        .card{transition:transform .3s ease;}
        .card:hover{transform:scale(1.03);}
        .glass{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
        .carousel{position:relative;width:100%;height:60vh;overflow:hidden;}
        .carousel-item{position:absolute;width:100%;height:100%;opacity:0;transition:opacity 1s ease;}

<script>
// 风格切换
function setStyle(style){
    if(style==="dark")document.body.className="bg-[#0F1014] text-white";
    if(style==="gold")document.body.className="bg-[#1A160A] text-[#D4AF37]";
    if(style==="light")document.body.className="bg-gray-100 text-gray-900";
}

// 轮播自动切换
let currentSlide=0;
const slides=document.querySelectorAll(".carousel-item");
setInterval(()=>{
    slides[currentSlide].classList.remove("active");
    currentSlide=(currentSlide+1)%slides.length;
    slides[currentSlide].classList.add("active");
},5000);
</script>
